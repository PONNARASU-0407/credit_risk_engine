{% extends "base.html" %}

{% block title %}Admin Login - Credit Risk Engine{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card admin-card">
        <h2 class="auth-title">Admin Login</h2>
        <p class="auth-subtitle">Secure access for administrators</p>
        
        <form method="POST" action="{{ url_for('admin_login') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text" id="username" name="username" required class="form-control" placeholder="Enter admin username">
            </div>
            
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password" required class="form-control" placeholder="Enter admin password">
            </div>
            
            <button type="submit" class="btn btn-danger btn-block">Admin Login</button>
        </form>
        
        <div class="auth-footer">
            <p><a href="{{ url_for('user_login') }}">User Login</a> | <a href="{{ url_for('index') }}">Back to Home</a></p>
        </div>
        
        <div class="demo-credentials">
            <p><strong>Demo Admin Credentials:</strong></p>
            <p>Username: <code>admin</code> | Password: <code>admin123</code></p>
        </div>
    </div>
</div>
{% endblock %}
